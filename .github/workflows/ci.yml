name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Create the virtual environment (matrix Python)
        run: uv venv --python ${{ matrix.python-version }}

      - name: Install project
        run: uv pip install -e '.[dev,cli]'

      - name: Ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Mypy (strict types)
        run: uv run mypy

      - name: Import boundaries (core stays headless)
        run: uv run lint-imports

      - name: Tests + coverage gate on the domain, persistence & render layers
        run: >-
          uv run pytest
          --cov=dungeon_clash.core --cov=dungeon_clash.strategy
          --cov=dungeon_clash.passive --cov=dungeon_clash.active
          --cov=dungeon_clash.service --cov=dungeon_clash.adapters
          --cov-report=term-missing --cov-fail-under=90
